- name: Run the role
  hosts: venv
  roles:
    - role: python_venv_build
  handlers:
    - name: Run noop handler
      community.general.ini_file:
        dest: "/etc/ansible/facts.d/{{ venv_facts_dest }}.fact"
        section: "{{ inventory_hostname }}"
        option: handler
        value: true
        mode: "0644"
      listen:
        - venv changed
